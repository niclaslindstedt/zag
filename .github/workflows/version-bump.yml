name: version-bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (leave empty to auto-detect from commits)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

jobs:
  create-release-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          # A PAT (or GitHub App token) is required so that the tag push
          # triggers the release workflow.  The default GITHUB_TOKEN
          # deliberately does not trigger downstream workflows.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout main branch
        run: |
          git checkout main

      - name: Run release script
        run: scripts/release.sh ${{ inputs.bump }}
